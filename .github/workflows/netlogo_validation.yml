name: NetLogo validation

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Java (needed by NetLogo) ──────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── Download NetLogo headless jar ─────────────────────────────────────────
      - name: Download NetLogo 6.4.0
        run: |
          wget -q https://github.com/NetLogo/NetLogo/releases/download/v6.4.0/NetLogo-6.4.0-64.tgz
          tar -xzf NetLogo-6.4.0-64.tgz
          echo "NETLOGO_HOME=$(pwd)/NetLogo-6.4.0-64" >> $GITHUB_ENV

      # ── Run NetLogo baseline experiment ──────────────────────────────────────
      - name: Run NetLogo baseline_validation experiment
        run: |
          "$NETLOGO_HOME/netlogo-headless.sh" \
            --model "Co-adotpion_v1_1.nlogo" \
            --experiment baseline_validation \
            --table netlogo_baseline.csv \
            --threads 1
        env:
          JAVA_TOOL_OPTIONS: -Djava.awt.headless=true

      - name: Upload NetLogo output
        uses: actions/upload-artifact@v4
        with:
          name: netlogo-baseline
          path: netlogo_baseline.csv

      # ── Python setup ─────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest

      # ── Run comparison test ───────────────────────────────────────────────────
      - name: Run NetLogo vs Python comparison test
        run: pytest tests/test_netlogo_comparison.py -v -s
        env:
          NETLOGO_CSV: ${{ github.workspace }}/netlogo_baseline.csv
